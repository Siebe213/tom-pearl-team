const musicNames=['Yara Yara','Phonk Tiki','Du bist gut genug'],musicUrls=[null,null,null];
let musicIndex=0,musicEnabled=!!read('v20settings',{}).music;
const legendAudio=$('legendAudio'),musicDock=$('musicDock');
function availableMusic(from=musicIndex,step=1){
  for(let i=0;i<musicUrls.length;i++){const index=(from+i*step+musicUrls.length*4)%musicUrls.length;if(musicUrls[index])return index}
  return -1
}
function loadMusic(index,autoplay=false){
  const found=musicUrls[index]?index:availableMusic(index,1);if(found<0){$('musicNow').textContent='Add the three requested tracks in Studio';return}
  musicIndex=found;legendAudio.src=musicUrls[found];$('musicNow').textContent=musicNames[found];
  if(autoplay)legendAudio.play().catch(()=>{})
}

function drawCinemaImage(ctx,img,w,h,zoom,alpha){
  if(!img||!img.naturalWidth)return;
  const scale=Math.max(w/img.naturalWidth,h/img.naturalHeight)*zoom,dw=img.naturalWidth*scale,dh=img.naturalHeight*scale;
  ctx.globalAlpha=alpha;ctx.drawImage(img,(w-dw)/2,(h-dh)/2,dw,dh);ctx.globalAlpha=1
}
function drawTomFilmFrame(ctx,index,p,w=640,h=360){
  const forms=cinemaTomForms(),position=p*(forms.length-1),base=Math.floor(position),mix=position-base;
  const a=forms[base%forms.length]?._img,b=forms[Math.min(forms.length-1,base+1)]?._img;
  ctx.fillStyle='#030104';ctx.fillRect(0,0,w,h);
  drawCinemaImage(ctx,a,w,h,1.03+p*.08,1-mix);drawCinemaImage(ctx,b,w,h,1.10-p*.04,mix);
  const shade=ctx.createLinearGradient(0,0,0,h);shade.addColorStop(0,'rgba(10,2,12,.08)');shade.addColorStop(.62,'rgba(10,2,12,.1)');shade.addColorStop(1,'rgba(10,2,12,.94)');ctx.fillStyle=shade;ctx.fillRect(0,0,w,h);
  ctx.strokeStyle=index===1?'#27f5ff':'#ffd447';ctx.lineWidth=4;ctx.strokeRect(18,18,w-36,h-36);
  ctx.fillStyle='#ffd447';ctx.font='900 13px Arial';ctx.fillText('THOMAS PATRICK PEARL / ARCHIVE FILM '+(index+1),34,48);
  ctx.fillStyle='#fff4cc';ctx.font='1000 42px Arial';ctx.fillText(['THE ARRIVAL','THE FIVE FORMS','THE THOMAS CROWN'][index],34,h-58);
  ctx.fillStyle='#ff9bb3';ctx.font='800 12px Arial';ctx.fillText('TOM-ONLY LEGEND PROTOCOL',36,h-32)
}
function renderBuiltInTomFilm(index){
  return new Promise((resolve,reject)=>{
    if(!window.MediaRecorder||!HTMLCanvasElement.prototype.captureStream){reject(new Error('video rendering unsupported'));return}
    const canvas=document.createElement('canvas'),ctx=canvas.getContext('2d'),w=640,h=360,duration=4600;
    canvas.width=w;canvas.height=h;
    const stream=canvas.captureStream(24),chunks=[];
    let recorder;
    try{recorder=new MediaRecorder(stream,MediaRecorder.isTypeSupported('video/webm;codecs=vp8')?{mimeType:'video/webm;codecs=vp8'}:{mimeType:'video/webm'})}catch(e){reject(e);return}
    recorder.ondataavailable=e=>{if(e.data.size)chunks.push(e.data)};
    recorder.onerror=e=>reject(e.error||e);
    recorder.onstop=()=>{stream.getTracks().forEach(t=>t.stop());resolve(URL.createObjectURL(new Blob(chunks,{type:recorder.mimeType||'video/webm'})))};
    const start=performance.now();
    recorder.start(250);
    function frame(t){
      const elapsed=t-start,p=cinemaClamp(elapsed/duration,0,1);drawTomFilmFrame(ctx,index,p,w,h);
      if(elapsed<duration)requestAnimationFrame(frame);else recorder.stop()
    }
    requestAnimationFrame(frame)
  })
}
let cinemaCanvasRun=0;
function playTomCanvasFilm(index){
  const canvas=$('tomCinemaCanvas'),video=$('tomCinemaVideo'),screen=$('cinemaScreen'),ctx=canvas.getContext('2d'),run=++cinemaCanvasRun,start=performance.now(),duration=4600;
  video.pause();video.style.display='none';canvas.style.display='block';screen.classList.remove('empty');
  function frame(t){if(run!==cinemaCanvasRun)return;const p=((t-start)%duration)/duration;drawTomFilmFrame(ctx,index,p,canvas.width,canvas.height);requestAnimationFrame(frame)}
  requestAnimationFrame(frame)
}
async function playCinemaSlot(index){
  const video=$('tomCinemaVideo'),screen=$('cinemaScreen'),url=cinemaUrls[index];
  document.querySelectorAll('.cinemaClip').forEach((clip,i)=>clip.classList.toggle('active',i===index));

    try{nextUrl=await renderBuiltInTomFilm(index);cinemaUrls[index]=nextUrl;label.textContent='Built-in Tom-only film rendered and ready.'}
    catch(e){label.textContent='Playing the built-in Tom-only canvas film.';btn.disabled=false;btn.textContent='Replay film';playTomCanvasFilm(index);return}
    btn.disabled=false;btn.textContent='Replay film'
  }
  cinemaCanvasRun++;$('tomCinemaCanvas').style.display='none';video.style.display='block';screen.classList.remove('empty');video.src=nextUrl;video.play().catch(()=>{})
}
document.querySelectorAll('.cinemaClip input[type=file]').forEach((input,index)=>{
  input.addEventListener('change',()=>{
    const file=input.files&&input.files[0];if(!file)return;
    if(!file.type.startsWith('video/')){input.closest('.cinemaClip').querySelector('.muted').textContent='Choose a video file.';input.value='';return}
    if(file.size>250*1024*1024){input.closest('.cinemaClip').querySelector('.muted').textContent='Keep archive clips below 250 MB.';input.value='';return}
    if(cinemaUrls[index])URL.revokeObjectURL(cinemaUrls[index]);

    const clip=input.closest('.cinemaClip'),label=clip.querySelector('.muted');label.textContent=file.name+' - '+Math.max(1,Math.round(file.size/1024/1024))+' MB';
    playCinemaSlot(index)
  })
});

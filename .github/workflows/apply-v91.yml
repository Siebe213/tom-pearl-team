name: Apply Pearl.io V9.1

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-v91.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build and verify V9.1
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          p.write_bytes(p.read_bytes().replace(b'\r\n',b'\n'))
          PY
          base64 --decode upgrade-v91.xz.b64 | xz --decompress > /tmp/upgrade-v91.js
          node /tmp/upgrade-v91.js index.html index.html
          grep -q 'Pearl.io V9.1 - Living Arena' index.html
          grep -q 'AI-ONLY' index.html
          grep -q "virus-cover" index.html
          grep -q 'id!==game.loopId' index.html
      - name: Publish and clean temporary files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git rm upgrade-v91.xz.b64 .github/workflows/apply-v91.yml
          git commit -m 'Upgrade Pearl.io to V9.1 living arena'
          git push origin main

name: Restore stable Pearl.io site

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-public-arena.yml

permissions:
  contents: write

jobs:
  restore-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Restore the pre-multiplayer game
        run: |
          git show f97b92d02837c36dbdb924106a22808dcb69be1b:index.html > index.html
          git rm -r --ignore-unmatch public scripts test
          git rm --ignore-unmatch server.js online-client.js package.json render.yaml README.md .gitignore
          git rm --ignore-unmatch .github/workflows/apply-public-arena.yml
      - name: Verify the restored page
        run: |
          ! grep -q "online-client.js" index.html
          ! grep -q "if(false){" index.html
          grep -q "Spawn / Restart" index.html
      - name: Commit the clean site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Remove multiplayer and restore the stable site"
          git push

name: Apply Pearl.io V9

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-v9.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build Pearl.io V9
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          p.write_bytes(p.read_bytes().replace(b'\r\n', b'\n'))
          PY
          base64 --decode upgrade-v9.xz.b64 | xz --decompress > /tmp/upgrade-v9.js
          node /tmp/upgrade-v9.js index.html index.html
          grep -q 'Pearl.io V9 - Rival AI' index.html
          grep -q 'Pearl Casino V9' index.html
          grep -q "'opportunist'" index.html
      - name: Publish and clean temporary files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git rm upgrade-v9.xz.b64 .github/workflows/apply-v9.yml
          git commit -m 'Upgrade Pearl.io to V9 rival AI and casino'
          git push origin main
